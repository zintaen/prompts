# F006 — Config-precedence, budgets, and exclusions, fresh repo
#
# Purpose: close the three coverage gaps documented in rule-registry.json:
#   O-mode-precedence-inline-over-env  — inline MODE directive wins over env var.
#   C-budgets-respected                — exceeding budgets.max_files_per_task
#                                        truncates and emits a *soft* warning,
#                                        never a hard violation and never
#                                        silent scanner output.
#   C-exclusions-respected             — files under exclusions.paths or
#                                        matching exclusions.globs are never
#                                        scanned, never cited in evidence,
#                                        never counted in counts.*.
#
# Status: fresh (no seed). One src/ finding (real, must-find) plus two trap
# findings in excluded locations (must-not-find) plus N benign src/*.js
# files to push the security scanner over its max_files_per_task=10 budget.
#
# Invariant summary (all three proved load-bearing by fault_inject.py):
#
#   I1 (O1): run_summary.invocation.effective_mode == "scan" with
#            provenance = { source: "inline", wins_over: "env"; env_value:
#            "execute" }. Mutating effective_mode to "execute" trips a hard
#            violation.
#
#   I2 (C1): No finding, evidence.path, or counts entry references any path
#            under vendor/ or matching *.min.js / node_modules/**. The
#            planted credentials in those trees MUST NOT be surfaced.
#            Injecting even one such path trips a hard violation.
#
#   I3 (C2): counts.files_scanned <= budgets.max_files_per_task per scanner,
#            AND run_summary.soft_violations contains a BUDGET_TRUNCATED
#            entry with truncated_count > 0 when budget was hit. Removing
#            the warning while keeping the truncation trips a hard violation
#            (silent truncation is worse than the truncation itself).

id: F006-config-precedence-budgets-exclusions
type: fresh
description: >
  Small synthetic repo whose topology deliberately crosses three AUDIT.md
  axes at once: (1) the invocation carries a contradicting inline MODE
  directive ("MODE=scan") while the simulated env sets MODE=execute, so
  the scanner must honor inline; (2) the repo has ~14 .js files that the
  security scanner would want to visit, but budgets.max_files_per_task is
  10, so the scanner must truncate and surface a soft warning; (3) three
  excluded locations (vendor/fake-lib/**, dist/*.min.js, node_modules/**)
  contain tempting but forbidden findings (hardcoded credentials) that
  MUST stay out of every emitted artifact.

exercises_rules:
  - "O-mode-precedence-inline-over-env"
  - "C-budgets-respected"
  - "C-exclusions-respected"
  - "R-anti-drift-evidence-required"
  - "R-anti-drift-moscow-closed"
  - "R-anti-drift-severity-ladder"
  - "R-anti-drift-hitl-banner-required"
  - "R-anti-drift-redaction-required"
  - "P-step-7-5-self-conformance"
  - "O-run-summary-json-schema"

invocation:
  inline_directive: "MODE=scan"
  env:
    MODE: "execute"
    SCOPE: "full"
    DRY_RUN: "false"
    RUN_TRIGGER: "manual"
  expected_effective:
    mode:
      value: "scan"
      source: "inline"
      wins_over: "env"
    scope:
      value: "full"
      source: "env"
    dry_run:
      value: false
      source: "env"
    run_trigger:
      value: "manual"
      source: "env"

config:
  budgets:
    # Per §BUDGETS & LIMITS — we use per-task to make the trip cheap.
    max_files_scanned: 5000
    max_files_per_task: 10
  exclusions:
    paths:
      - "vendor/"
      - "node_modules/"
    globs:
      - "*.min.js"

expected_findings:
  - category: SEC
    type: security
    source_path: "src/app.js"
    evidence_hint: "One hardcoded API key literal in src/app.js"
    severity_floor: high
    must_be_new: true
    must_redact_all_literals: true

# Planted credentials used for invariant check (grep the .audit/ tree and
# require these NEVER appear — excluded-path literals should neither be
# redacted nor exposed; they should simply be absent).
planted_literals_excluded:
  - id: vendor-secret
    path: "vendor/fake-lib/secret.js"
    raw: "sk_live_51VendorShouldNeverAppearInOutputF006"
    rule: "Must stay out of output entirely; the file is excluded by path."
  - id: nodemodules-secret
    path: "node_modules/lodash/pkg.js"
    raw: "ghp_NodeModulesShouldNeverAppearInOutputF006"
    rule: "Must stay out of output entirely; node_modules/ excluded by path."
  - id: minjs-secret
    path: "dist/app.min.js"
    raw: "AKIAIMINJSSHOULDNEVERAPPEAR0F006"
    rule: "Must stay out of output entirely; *.min.js excluded by glob."

planted_literals_included:
  - id: src-api-key
    path: "src/app.js"
    raw: "AKIA0987654321F006DELIBERATEKEY"
    rule: "Real finding. Must be discovered, redacted to [REDACTED:aws-key], and cited in evidence with path=src/app.js."
    expected_label: "[REDACTED:aws-key]"

budget_trip:
  scanner: "security"
  files_in_scope: 15        # 14 src/*.js + repo/README.md after exclusions
  max_files_per_task: 10
  expected_truncated_count: 5
  expected_soft_violation:
    code: "BUDGET_TRUNCATED"
    scanner: "security"
    limit: "max_files_per_task=10"
    truncated_count: 5
    advisory: >
      Scanner truncated file visits to honor §BUDGETS.max_files_per_task.
      Surface the missed-work count; do not emit as hard violation.
