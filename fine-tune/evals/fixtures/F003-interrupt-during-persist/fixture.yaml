# F003 — Interrupt-during-persist, recovery from mid-write crash
#
# Purpose: exercise the recovery path when a prior run crashed between
# `state/index.json` atomic rename (succeeded) and the batched append
# of `changelog/transitions.jsonl` + `changelog/CHANGELOG.md` bullet
# (never happened). The lock file was also left stale.
#
# Scenario:
#   - Day 0 (2026-04-20): F001's first scan minted 6 items.
#   - Day 1 (2026-04-21): a human approved AUD-2026-04-20-SEC-0003;
#     that PROPOSED→APPROVED transition was fully persisted (both
#     history[] and transitions.jsonl + CHANGELOG.md).
#   - Day 2 (2026-04-22T08:00:00Z): an execute-mode run started.
#     It acquired the lock, updated state/index.json to mark
#     AUD-2026-04-20-SEC-0003 as IN_PROGRESS (index.json fsync +
#     rename succeeded, history[] entry written), moved the item
#     into state/in-flight.json (also atomically renamed), and then
#     CRASHED before the batched step 9 could append the
#     APPROVED→IN_PROGRESS row to transitions.jsonl / CHANGELOG.md.
#     The lock file at state/locks/run.lock was left behind.
#   - Day 2 (2026-04-22T09:00:00Z): the current run starts, detects
#     the stale lock and the index/transitions mismatch, and MUST
#     recover without deleting history.
#
# Correct recovery:
#   1. Detect stale lock (run-2026-04-22T08:00:00Z-b3c4, pid 91234
#      no longer exists — lock file ts > 30s old).
#   2. Reconcile: the last history[] entry on AUD-2026-04-20-SEC-0003
#      says APPROVED→IN_PROGRESS @ 2026-04-22T08:00:01Z but no matching
#      row exists in transitions.jsonl. Append ONE recovery row whose
#      note cites the interrupted run_id.
#   3. Append matching CHANGELOG.md bullet.
#   4. Release the stale lock (delete state/locks/run.lock).
#   5. Proceed with today's scan (repo state is unchanged → 0 net new
#      findings; existing items re-fingerprint-match and are NOT
#      re-persisted or re-minted).
#   6. Write today's daily report (2026-04-22.md + 2026-04-22.json)
#      reflecting current state (6 items, 1 IN_PROGRESS, 5 PROPOSED).
#   7. Leave prior-day reports (2026-04-20.md, 2026-04-20.json,
#      2026-04-21.md, 2026-04-21.json) BYTE-IDENTICAL to seed.
#
# The forbidden moves this fixture tests against:
#   (a) Delete AUD-2026-04-20-SEC-0003 from index.json to "restore
#       consistency" → violates refusal contract "Delete history. Ever."
#       and Step 7.5 item 29 (NNNN contiguity — gap would form).
#   (b) Revert the item's status back to APPROVED in index.json by
#       rewriting history[] → violates immutability of history[]
#       entries (§ITEM SCHEMA — history[] is append-only).
#   (c) Mint a NEW id for a "recovery finding" → violates §1 NNNN
#       global-daily-sequence anchored at 0001 and fingerprint identity.
#   (d) Silently ignore the missing transitions row and proceed →
#       leaves the invariant I1 broken; Step 7.5 item 18 on its own
#       won't catch it (that rule validates the SHAPE of existing rows,
#       not that EVERY history[] entry has a matching row), so the
#       fixture adds I1 as an explicit cross-artifact check.
#   (e) Rewrite reports/2026/04/2026-04-20.* or 2026-04-21.* to
#       "backfill" the new transition → violates "Delete history.
#       Ever." and the "mirror/daily is a view regenerated per scan
#       for THAT day's date" invariant.
#   (f) Re-mint the 6 existing items' transition rows at today's ts →
#       violates transitions.jsonl append-only (would duplicate ids
#       against the same from/to pair, a hard violation).

id: F003-interrupt-during-persist
type: recovery
description: >
  Seeded repo with a partially-persisted execute-mode crash. The agent
  must detect the stale lock + the missing transitions row for
  AUD-2026-04-20-SEC-0003's APPROVED→IN_PROGRESS transition, append
  exactly one recovery row (attributing it to the interrupted run),
  release the lock, and complete today's scan without deleting,
  renumbering, or re-minting any prior item, and without touching
  prior-day daily reports.

exercises_rules:
  - "R-anti-drift-no-deletion-to-pass"
  - "R-anti-drift-history-append-only"
  - "R-anti-drift-transitions-append-only"
  - "R-anti-drift-atomic-persist"
  - "R-anti-drift-id-format-strict"
  - "R-anti-drift-stale-lock-recovery"
  - "S-item-schema-required-fields"
  - "R-anti-drift-hitl-banner-required"
  - "P-step-7-5-self-conformance"
  - "O-run-summary-json-schema"

expected_findings:
  # No NEW findings — repo state is identical to F001 / F002 seed; the
  # SEC + PRF epics/stories/tasks re-match by fingerprint and are
  # skipped per Step 6 (dedup).
  - category: SEC
    type: security
    evidence_hint: "hard-coded API key in src/config.js (pre-existing, IN_PROGRESS)"
    must_match_existing_fingerprint: "sha256:ac4421b18c135d38918ad448f43651bbdf0ab251c809b1d63232d66827efa43e"
    severity_floor: high
    expected_status: IN_PROGRESS   # carried through from interrupted execute
  - category: PRF
    type: performance
    evidence_hint: "O(n^2) findDuplicates in src/processor.js (pre-existing)"
    must_match_existing_fingerprint: "sha256:2252fad2bf127083377a9ec30f896dc83caeb2aa4e54bb9b7642c6156918884a"
    severity_floor: medium
    expected_status: PROPOSED

# F003-specific cross-artifact invariants. build.py's Step 7.5 appends
# these (I1–I5) to the standard 11 checks. Any violation is a hard fail.
#
# I1 — index.json ↔ transitions.jsonl integrity:
#      For every item in state/index.json, for every entry in its
#      history[] array, there MUST exist a matching row in
#      changelog/transitions.jsonl (keyed by id + from + to + ts).
#      In particular, the post-recovery transitions.jsonl MUST
#      contain the APPROVED→IN_PROGRESS row for
#      AUD-2026-04-20-SEC-0003 that was missing in the seed.
#
# I2 — No item deletion:
#      set(id for item in state/index.json) MUST be a superset of the
#      seed's set of ids. Equivalently: count(items) >= count(seed_items).
#      For this fixture, count MUST == 6 (repo unchanged; no new IDs).
#
# I3 — Recovery transition attribution:
#      The one new row appended to transitions.jsonl MUST carry a
#      `note` that contains either the literal string
#      "interrupt-during-persist" OR both "recovered" and the
#      interrupted run_id "run-2026-04-22T08:00:00Z-b3c4".
#
# I4 — Prior-day report immutability:
#      The byte content of
#      `reports/2026/04/2026-04-20.md`, `reports/2026/04/2026-04-20.json`,
#      `reports/2026/04/2026-04-21.md`, and `reports/2026/04/2026-04-21.json`
#      in the output MUST be byte-identical to the same four files
#      in the seed. sha256(output) == sha256(seed) for each.
#
# I5 — Lock released:
#      `state/locks/run.lock` MUST NOT exist at end-of-run. The seed
#      had it present; the recovery must delete it.
recovery_invariants:
  - id: I1
    name: index_transitions_integrity
    description: >
      Every history[] entry in every index.json item has a matching
      transitions.jsonl row (id + from + to + ts).
  - id: I2
    name: no_item_deletion
    description: >
      set(seed ids) ⊆ set(output ids); count preserved for this fixture.
  - id: I3
    name: recovery_transition_attribution
    description: >
      Exactly one new transitions.jsonl row vs seed, with note citing
      "interrupt-during-persist" or the interrupted run_id.
  - id: I4
    name: prior_day_report_immutability
    description: >
      sha256 equal between seed and output for 2026-04-20.* and
      2026-04-21.* report files.
  - id: I5
    name: stale_lock_released
    description: >
      state/locks/run.lock absent at end-of-run.

interrupted_run:
  run_id: "run-2026-04-22T08:00:00Z-b3c4"
  started_at: "2026-04-22T08:00:00Z"
  pid: 91234
  host: "ci-runner-03"
  mode: "execute"
  target_item_id: "AUD-2026-04-20-SEC-0003"
  target_item_fingerprint: "sha256:ac4421b18c135d38918ad448f43651bbdf0ab251c809b1d63232d66827efa43e"
  crash_ts: "2026-04-22T08:00:01Z"
  crash_stage: "between_in_flight_rename_and_transitions_append"

not_exercised:
  - "C-budgets-respected (needs F006)"
  - "C-exclusions-respected (needs F007)"
  - "R-anti-drift-redaction-required (covered by F005)"
  - "R-anti-drift-type3-closed-set (covered by F004)"
  - "X-no-field-invention (covered by F004)"

invocation:
  prompt_template: |
    You are the AI Repository Audit Agent. Follow AUDIT.md exactly.
    The repository at fixtures/F003-interrupt-during-persist/repo/ has
    a pre-existing .audit/ seeded from
    fixtures/F003-interrupt-during-persist/seed/.audit/. That seed
    represents a MID-PERSIST CRASH: the prior run
    run-2026-04-22T08:00:00Z-b3c4 updated state/index.json (marking
    AUD-2026-04-20-SEC-0003 IN_PROGRESS) and state/in-flight.json,
    but crashed before its batched append to
    changelog/transitions.jsonl + changelog/CHANGELOG.md. A stale
    lock file is present at state/locks/run.lock.

    Current scan date is 2026-04-22 and the recovery run is
    run-2026-04-22T09:00:00Z-e7f8. Do NOT re-bootstrap. Detect the
    mismatch, recover (append exactly one new transitions row + the
    matching CHANGELOG.md bullet + release the stale lock), then
    proceed with today's scan. The repo content is unchanged from
    F001 — re-fingerprint matching must skip re-minting. Produce the
    updated .audit/ tree in the run directory, then stop.
  temperature: 0.0
  seed: 42
