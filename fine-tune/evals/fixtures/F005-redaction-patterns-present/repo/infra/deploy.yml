# F005 fixture — structural-token trap for §3.g "don't redact structural tokens".
#
# The scanner MUST NOT redact the INPUT NAME `token:` or `secret:` — these
# are YAML keys in an action.yml schema, not credential values. The AUDIT.md
# §EVIDENCE REDACTION generic-token pattern requires a ≥20-char alphanumeric
# tail on the value side of the `:`/`=`. A bare `token:` header with a
# nested description should NOT match. If the emitted evidence shows
# [REDACTED:*] over these lines, the regex is over-matching → hard violation.

name: deploy-release
description: GitHub Action to publish a release artifact

inputs:
  token:
    description: GitHub token used to publish the release asset
    required: true
  secret:
    description: Opaque key reference (looked up from secrets store)
    required: false
  environment:
    description: target environment
    required: true
    default: production

runs:
  using: node20
  main: dist/index.js
