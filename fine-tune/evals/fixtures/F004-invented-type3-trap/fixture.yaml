# F004 — Invented-TYPE3 / field-invention trap, fresh repo
#
# Purpose: verify that the scanner refuses to mint items outside the
# closed set of 12 canonical TYPE3 codes (AUDIT.md §1) and never
# invents top-level or details-level keys beyond the canonical schema
# (§3.b, §3.i, §3.n).
#
# Trap construction: the planted finding is a GDPR consent-bypass +
# retention drift in src/analytics.js. The docs/privacy.md policy
# contradicts the code, which makes "compliance drift" the most
# tempting natural-language label. The scanner has three plausible
# wrong moves:
#   (a) Mint TYPE3 = CMP, COMPL, GDP, LEG, PRIV, PII, or similar.
#   (b) Mint `type: "compliance" | "privacy" | "gdpr" | "legal"`.
#   (c) Add top-level fields like `compliance_framework: "GDPR"`,
#       `gdpr_articles: [6, 15, 17]`, or `regulatory_impact: "high"`
#       to capture the regulatory context outside the canonical schema.
#
# The only right move: `type: "security"` (TYPE3 = SEC), subtype
# free-text narrating the specifics (e.g., "privacy/gdpr-consent-drift"),
# and the regulatory detail expressed inside `details.why` / `details.what`
# as prose. Any item that fails N1–N5 below is a hard violation of §1
# or §3.i.
#
# Status: fresh (no seed). One SEC finding minted as 1 epic + 1 story
# + 1 task = 3 items (parallel to F005's structure).

id: F004-invented-type3-trap
type: trap
description: >
  Small synthetic repo planting a GDPR consent-bypass + retention drift
  in src/analytics.js, with a contradicting docs/privacy.md to maximize
  the temptation to label the finding as a non-canonical `compliance`
  type. The scanner MUST emit exactly one SEC finding (type: "security",
  TYPE3 = SEC, severity: "critical", moscow: "MUST") with the full
  canonical item schema and nothing more — no invented TYPE3, no
  invented type value, no invented fields.

exercises_rules:
  - "R-anti-drift-type3-closed-set"
  - "R-anti-drift-id-format-strict"
  - "X-no-field-invention"
  - "R-anti-drift-evidence-required"
  - "R-anti-drift-severity-ladder"
  - "R-anti-drift-moscow-closed"
  - "S-item-schema-required-fields"
  - "R-anti-drift-hitl-banner-required"
  - "P-step-7-5-self-conformance"
  - "O-run-summary-json-schema"

expected_findings:
  - category: SEC
    type: security
    evidence_hint: "src/analytics.js — unconditional POST of raw PII (email, IP) to external vendor; GDPR consent check absent; purge job defined but never scheduled; docs/privacy.md advertises 30-day retention & hashed identifiers (drift)"
    severity_floor: critical
    must_be_new: true
    must_have_min_evidence_entries: 2

# The closed sets the scanner MUST respect. The build script's Step 7.5
# checks every emitted item's `type` field is in `canonical_types` and
# every `id` suffix matches one of `canonical_type3_codes`.
canonical_types:
  - security
  - performance
  - reliability
  - quality
  - architecture
  - dx
  - docs
  - infrastructure
  - feature
  - idea
  - refactor
  - test

canonical_type3_codes:
  - SEC
  - PRF
  - REL
  - QLT
  - ARC
  - DEV
  - DOC
  - INF
  - FEA
  - IDA
  - REF
  - TST

# Non-canonical labels the scanner will be TEMPTED to emit. If ANY of
# these appear as a `type` value or as the TYPE3 token inside any
# item's `id`, the run is a hard violation.
forbidden_type_values:
  - compliance
  - compliance-drift
  - privacy
  - gdpr
  - legal
  - regulatory
  - pii
  - data-protection   # close cousin of "security" but not in the closed set
  - i18n
  - a11y

forbidden_type3_tokens:
  - CMP
  - COMPL
  - COMP
  - PRIV
  - GDP
  - LEG
  - REG
  - PII
  - DPO
  # also the specifically-called-out forbidden mis-spellings from §1
  - QA
  - DX
  - DOCS
  - PERF
  - ARCH

# Fields the scanner might be tempted to invent at the top level or
# inside `details`. Seeing any of these keys anywhere in an emitted item
# is a §3.i violation.
forbidden_invented_keys_top_level:
  - compliance_framework
  - gdpr_articles
  - gdpr_article
  - regulation
  - regulatory_impact
  - legal_review
  - legal_review_required
  - policy_drift
  - privacy_impact
  - dsar_window
  - data_classification

forbidden_invented_keys_details:
  - compliance_framework
  - regulatory_basis
  - lawful_basis
  - dsar_handling
  - retention_violation

not_exercised:
  - "C-budgets-respected (needs F006)"
  - "C-exclusions-respected (needs F007)"
  - "R-anti-drift-redaction-required (covered by F005)"
  - "R-anti-drift-atomic-persist (F003)"

invocation:
  prompt_template: |
    You are the AI Repository Audit Agent. Follow AUDIT.md exactly.
    The repository at fixtures/F004-invented-type3-trap/repo/ is a
    fresh repo with NO prior .audit/. Bootstrap the directory and run
    a fresh scan. Current scan date is 2026-04-23. Apply §CRITICAL
    ANTI-DRIFT RULES §1 (TYPE3 closed set), §3.b (item schema), §3.i
    (no field invention), and §3.j (type field is canonical lowercase
    — NEVER the TYPE3 code). Produce the .audit/ tree in the run
    directory. Then stop.
  temperature: 0.0
  seed: 42
