# F008 — Step 7.5 sub-block coverage (E006 prerequisite)
#
# Purpose: gate E006 (split §Step 7.5 into 7.5a/7.5b/7.5c). Without this
# fixture, E006 could silently drop an item, miscategorize an anti-gaming
# rule into the schema-shape block (where a future 7.5b consolidation
# might collapse it), or orphan a cross-reference — no scenario fixture
# would catch it because none of F001-F006 depends on §Step 7.5 item
# ordering or exact anti-gaming wording.
#
# This is a META-fixture — it does NOT scan a synthetic repo. It reads
# AUDIT.md directly and validates §Step 7.5's structure and the
# verbatim survival of the 5 anti-gaming items.
#
# DUAL-MODE: auto-detects pre-E006 (flat 53-item §Step 7.5) vs. post-E006
# (§Step 7.5a / §Step 7.5b / §Step 7.5c sub-headers) by scanning for the
# sub-header tokens. Invariants adapt per mode, but anti-gaming signature
# preservation is enforced identically in both.
#
# Status: fresh (no seed, no repo). Single pass/fail result per run.

id: F008-step-7-5-sub-block-coverage
type: meta
description: >
  Parses §Step 7.5 in AUDIT.md and validates structural invariants +
  anti-gaming item preservation. Pre-E006: expects flat list of 53
  numbered items. Post-E006: expects 3 sub-blocks (7.5a schema-shape,
  7.5b behavioral, 7.5c anti-gaming) with the 5 anti-gaming items
  living verbatim under 7.5c. Anti-gaming preservation is checked by
  text-keyword signature (not item number), so the invariant survives
  renumbering. The only hard-failure outputs are machine-verifiable:
  item count drift, anti-gaming signature missing, cross-reference
  points into a non-existent sub-block, etc.

exercises_rules:
  - "S-step-7-5-sub-block-coverage"
  - "P-step-7-5-self-conformance"
  - "R-anti-drift-no-deletion-to-pass"
  - "R-anti-drift-no-category-mass-nulling"
  - "R-anti-drift-null-finding-quality"
  - "R-anti-drift-files-scanned-honesty"
  - "R-anti-drift-atomic-persist"
  # Added under v5-xmodel (2026-04-22): meta-fixture capture envelope and
  # invariants-cite-evidence are directly exercised by this fixture's own
  # capture.json shape — it uses the canonical {text, result, evidence}
  # invariants array and the full 8-key capture envelope with
  # content-hash-verified audit_md_version. See
  # runs/2026-04-22/claude-opus-4-7-cowork/F008-step-7-5-sub-block-coverage-v5-xmodel/capture.json.
  - "R-anti-drift-invariants-cite-evidence"
  - "R-meta-fixture-capture-envelope"

# Five anti-gaming items identified by text-keyword signature. These
# signatures are phrase fragments that appear verbatim in AUDIT.md under
# §Step 7.5 and MUST survive E006's split intact (either under the flat
# pre-E006 list or under §Step 7.5c post-E006 — the fixture does not
# care which sub-block they live in, only that every signature still
# resolves to exactly one item in §Step 7.5).
anti_gaming_signatures:
  - name: "null_finding_warning_quality"
    canonical_pre_e006_item: 30
    signature_phrases:
      - "Null-finding warning quality"
      - "searched_for"
      - "evidence_of_absence"
    rationale: >
      Item 30 — every null_finding must include searched_for (patterns
      run) AND evidence_of_absence (WHERE searched + zero-hit count).
      Bare reason: "no findings" is itself a hard violation.

  - name: "no_category_mass_nulling"
    canonical_pre_e006_item: 31
    signature_phrases:
      - "No category-mass-nulling"
      - "≥ 4 of the 8 categories"
      - "known escape hatch"
    rationale: >
      Item 31 — marking ≥ 4 of 8 scanner categories null_finding is a
      hard violation UNLESS each meets item-30 quality bar AND repo
      genuinely supports the absence.

  - name: "no_deletion_to_pass"
    canonical_pre_e006_item: 32
    signature_phrases:
      - "Anti-gaming / no-deletion-to-pass"
      - "REPAIR it"
      - "never delete to pass"
    rationale: >
      Item 32 — the canonical anti-gaming rule. When a downstream check
      fails, repair the finding (fix path, renumber, move severity) —
      NEVER delete to pass. Lists four self-detect signals: NNNN gaps,
      empty evidence[], manifest shrinkage via null_finding, and
      files_scanned drops.

  - name: "files_scanned_honesty"
    canonical_pre_e006_item: 33
    signature_phrases:
      - "`files_scanned` honesty"
      - "actual count of source files"
      - "Under-reporting to lower the discovery floor"
    rationale: >
      Item 33 — files_scanned must equal the actual count of source
      files inspected. Under-reporting to lower the discovery floor
      (item 16) is a hard violation.

  - name: "atomic_persist_check"
    canonical_pre_e006_item: 42
    signature_phrases:
      - "Atomic-persist check"
      - "findings_discovered"
      - "captured in follow-up"
    rationale: >
      Item 42 — len(state/index.json items) must equal
      findings_discovered post-dedup/post-supersede UNLESS truncated.
      Any stdout containing "captured in follow-up" or "deferred to
      next" is a hard violation. Scanner UNION (after dedup) must
      equal items[] — not a subset, not top N.

# Schema-shape items (destined for §Step 7.5a under E006). These are
# deterministic JSON/regex/closed-set conformance checks that a single
# "validate every artifact against SCHEMA.json; on any failure, repair,
# never delete to pass" instruction can consolidate. Listed by
# signature so the fixture can assert the consolidation did not drop
# any of them semantically (post-E006: they appear folded into 7.5a;
# pre-E006: they appear as discrete items in the flat list).
schema_shape_signatures:
  - "Empty-state shapes"             # item 2
  - "CHANGELOG header"               # item 3
  - "TYPE3 codes"                    # item 4
  - "type-mapping"                   # item 5
  - "Hierarchy IDs"                  # item 6
  - "run_id format"                  # item 9
  - "Counts derivation"              # item 10
  - "Cross-artifact ordering"        # item 11
  - "Links labels"                   # item 12
  - "Generated runs shape"           # item 17
  - "transitions.jsonl rows"         # item 18
  - "NNNN global sequence"           # item 20
  - "`details` schema by level"      # item 35
  - "Fingerprint uniqueness"         # item 37
  - "history[] key shape"            # item 46
  - "`type` field canonicalization"  # item 47
  - "`details.5m` and `details.cost`"  # item 48
  - "`links` shape"                  # item 49
  - "Mirror-state ID set equality"   # item 50
  - "Mirror-state order equality"    # item 51
  - "NNNN ≥ 0001 everywhere"         # item 52
  - "Counts reconciliation end-to-end"  # item 53
  - "Schema completeness per item"   # item 43
  - "Fingerprint prefix"             # item 44
  - "Redaction label closure"        # item 45

# Behavioral / judgment items (destined for §Step 7.5b under E006).
# These require qualitative reasoning that SCHEMA.json can't encode:
# freshness, evidence-relevance, identifier honesty, filler detection.
behavioral_signatures:
  - "Layout"                                       # item 1
  - "severity"                                     # item 7
  - "subtype"                                      # item 8
  - "Provenance"                                   # item 13
  - "Scanner manifest"                             # item 14
  - "Per-category evidence floor"                  # item 15
  - "Discovery floor"                              # item 16
  - ".md severity parity"                          # item 19
  - "5W1H2C5M analytical content"                  # item 21
  - "Story titles are bounded outcomes"            # item 22
  - "Report date freshness"                        # item 23
  - "Evidence blocks mandatory in .md"             # item 24
  - "Evidence grounding (anti-hallucination)"      # item 25
  - "Category relevance gate"                      # item 26
  - "Evidence array presence in `state/index.json`"  # item 27
  - "JSON/MD evidence parity"                      # item 28
  - "NNNN contiguity"                              # item 29
  - "5W1H2C5M sections mandatory in .md"           # item 34
  - "Evidence–title semantic relevance"            # item 36
  - "Evidence snippet grounding"                   # item 38
  - "5W1H2C5M non-boilerplate"                     # item 39
  - "Title-identifier honesty"                     # item 40
  - "File-presence honesty"                        # item 41

# Invariants the fixture enforces, keyed by mode. Mode is auto-detected
# by scanning AUDIT.md for the "## Step 7.5a" / "## Step 7.5b" /
# "## Step 7.5c" sub-headers; their presence means post-E006.
invariants:
  common:
    - "every anti_gaming_signature resolves to exactly one item in §Step 7.5"
    - "every schema_shape_signature resolves to at least one item or sub-block in §Step 7.5"
    - "every behavioral_signature resolves to at least one item or sub-block in §Step 7.5"
    - "no anti-gaming signature phrase appears outside §Step 7.5 anti-gaming context (the phrases are strict)"
    - "§Step 7.5 header exists with MANDATORY before Step 8 qualifier"
    - "§Step 7.5 has a closing paragraph containing 'repair (not skip)' or equivalent"

  pre_e006:
    - "§Step 7.5 is a flat numbered list"
    - "item count == 53"
    - "items are numbered contiguously 1..53"
    - "anti-gaming items live at numeric positions 30, 31, 32, 33, 42"
    - "no sub-header tokens (§Step 7.5a/b/c) exist"

  post_e006:
    - "three sub-headers exist: §Step 7.5a, §Step 7.5b, §Step 7.5c"
    - "§Step 7.5c contains exactly 5 anti-gaming items (all 5 signatures resolve under it)"
    - "§Step 7.5a is a single consolidated 'validate against SCHEMA.json' instruction (schema-shape items folded, not enumerated)"
    - "§Step 7.5b contains the behavioral items (~15 items expected)"
    - "total enumerated items across 7.5a + 7.5b + 7.5c is ≤ 53 (consolidation reduces count, never increases)"
    - "every schema_shape signature is either (a) named explicitly in 7.5a's consolidated instruction or (b) cross-referenced to SCHEMA.json"

# Cross-file checks — AUDIT.md cross-references to §Step 7.5 items must
# not orphan after E006.
cross_file_checks:
  - "every AUDIT.md occurrence of 'item 30' / 'item 31' / 'item 32' / 'item 33' / 'item 42' (or 'items 30-42') resolves — either the numeric reference still exists (pre-E006) or was rewritten to a §Step 7.5c pointer (post-E006)"
  - "no AUDIT.md cross-reference points at a non-existent §Step 7.5 sub-header"
  - "rule-registry.json `canonical_section_current` fields citing §Step 7.5 resolve — either to the flat section (pre-E006) or to 7.5a/b/c (post-E006)"

not_exercised:
  - "R-anti-drift-state-dir-allowlist (needs a real scan)"
  - "R-anti-drift-id-format-strict (no IDs minted)"
  - "R-anti-drift-fingerprint-format-strict (no fingerprints minted)"
  - "X-no-field-invention (no items emitted)"

invocation:
  prompt_template: |
    Parse AUDIT.md §Step 7.5. Auto-detect whether it is in pre-E006
    flat form (53 items) or post-E006 split form (§Step 7.5a + 7.5b +
    7.5c sub-headers). Validate:
      1. The 5 anti-gaming signatures (null_finding_warning_quality,
         no_category_mass_nulling, no_deletion_to_pass,
         files_scanned_honesty, atomic_persist_check) each resolve
         to exactly one item in §Step 7.5.
      2. In pre-E006 mode: item count == 53 and anti-gaming items
         live at positions 30, 31, 32, 33, 42.
      3. In post-E006 mode: §Step 7.5c contains exactly 5 anti-gaming
         items (all 5 signatures resolve under it) and §Step 7.5a
         consolidates the schema-shape items into a single
         SCHEMA.json validation instruction.
      4. No AUDIT.md cross-reference to §Step 7.5 items is orphaned.

    Emit capture.json with per-invariant pass/fail, detected mode, and
    a single top-level step_7_5_passed boolean. No repository scan.
    No .audit/ tree. Just the structural validation.
  temperature: 0.0
  seed: 42
