# F007 — Schema contract stability (E004 prerequisite)
#
# Purpose: verify that AUDIT.md's 11 pure-data blocks (the ones slated
# for extraction to SCHEMA.json under E004) are machine-parseable and
# internally consistent. Without this safety net, E004's extraction
# could silently drop a row, reorder a list, or typo a regex — no
# fixture would catch it. F007 parses each block deterministically and
# validates its structural invariants and cross-block consistency.
#
# This is a META-fixture — it does NOT scan a synthetic repo. It reads
# AUDIT.md directly and validates what the spec SAYS, not what an agent
# scanning some repo PRODUCES.
#
# Post-E004: same build.py, but its input shifts from AUDIT.md to
# SCHEMA.json. The invariants survive unchanged; only the parser front
# end changes. This is the fixture that unblocks E004.
#
# Status: fresh (no seed, no repo). Single pass/fail result per run.

id: F007-schema-contract-stability
type: meta
description: >
  Parses the 11 pure-data blocks in AUDIT.md (TYPE3 table, status state
  machine, MoSCoW set, scanner manifest, redaction patterns, details
  schema by level, counts.* keys, severity ladder, perf thresholds, sort
  order, 5W1H2C5M sub-blocks) and validates structural invariants +
  cross-block consistency. The only hard-failure outputs are
  machine-verifiable: regex doesn't compile, closed set has duplicates,
  cross-block closure is broken, etc.

exercises_rules:
  - "S-audit-md-pure-data-blocks-parseable"
  - "R-anti-drift-type3-closed-set"
  - "R-anti-drift-status-machine-closed"
  - "R-anti-drift-moscow-closed"
  - "R-anti-drift-severity-ladder"
  - "R-anti-drift-redaction-required"
  - "R-anti-drift-redaction-labels-closed-set"
  - "P-step-7-5-self-conformance"
  - "O-run-summary-json-schema"
  # Added under v5-xmodel (2026-04-22): F007's trap_invariants[] emit the
  # canonical {text, result, evidence} shape (proves
  # R-anti-drift-invariants-cite-evidence), and F007's capture.json uses
  # the full §META-FIXTURE CAPTURE ENVELOPE shape with audit_md_version
  # content-hash-verified pre-parse (proves R-meta-fixture-capture-envelope).
  # See runs/2026-04-22/claude-opus-4-7-cowork/F007-schema-contract-stability-v5-xmodel/capture.json.
  - "R-anti-drift-invariants-cite-evidence"
  - "R-meta-fixture-capture-envelope"

# The 11 blocks this fixture validates. The build script parses each
# from AUDIT.md with a deterministic regex/heading-scan and asserts the
# listed invariants.
blocks:
  - name: "TYPE3 ↔ type mapping"
    location: "§1 'The 12 canonical TYPE3 codes'"
    shape: "dict[TYPE3_3char, canonical_type_lowercase]"
    expected_row_count: 12
    invariants:
      - "exactly 12 rows"
      - "no duplicate TYPE3 keys"
      - "no duplicate type values (bijection)"
      - "every TYPE3 is 3-uppercase-letter"
      - "every type is single-lowercase-word"

  - name: "Status state machine"
    location: "§STATUS STATE MACHINE"
    shape: "closed set of 7 status names + transition edges"
    expected_status_count: 7
    invariants:
      - "7 statuses: PROPOSED, APPROVED, IN_PROGRESS, DONE, DEFERRED, WONT_DO, REJECTED"
      - "no status name referenced in transitions is outside the 7-set"
      - "terminal states (DONE, WONT_DO, REJECTED) are present"

  - name: "MoSCoW priority set"
    location: "§Definitions §MoSCoW"
    shape: "ordered closed set"
    expected_count: 4
    invariants:
      - "4 values: MUST, SHOULD, COULD, WONT"
      - "order preserved (priority descending)"

  - name: "Scanner manifest"
    location: "§Scanner manifest"
    shape: "ordered list of 8 scanner names"
    expected_count: 8
    invariants:
      - "exactly 8 scanners"
      - "canonical order preserved: security, performance, reliability, quality, architecture, dx, docs, ideas"
      - "no duplicates"

  - name: "Evidence redaction patterns"
    location: "§EVIDENCE REDACTION"
    shape: "list of {pattern, label} pairs, length 8"
    expected_count: 8
    invariants:
      - "exactly 8 patterns"
      - "every pattern compiles as Python regex"
      - "every label matches [REDACTED:<kebab-case>] closed-set form"
      - "no pattern matches the bare structural tokens 'token' / 'password' / 'secret' (sanity — §3.g rule)"

  - name: "details schema by level"
    location: "§ITEM SCHEMA §'details schema by level'"
    shape: "dict[level, {required, allowed, forbidden}]"
    expected_levels: ["epic", "story", "task"]
    invariants:
      - "3 levels: epic, story, task"
      - "epic: required = {what, why}; 7 forbidden"
      - "story: required = {what, why}; allowed = {who, when, where}; 5 forbidden"
      - "task: required is all 9 fields; forbidden is empty"

  - name: "counts.* keys"
    location: "§OUTPUT CONTRACT 'Derivation rule'"
    shape: "dict[counts_field, closed_set]"
    expected_fields: ["by_level", "by_moscow", "by_assignee", "by_status"]
    invariants:
      - "4 by_* fields"
      - "by_level: {EPIC, STORY, TASK}"
      - "by_moscow: {MUST, SHOULD, COULD, WONT}"
      - "by_assignee: {AGENT, HUMAN}"
      - "by_status: 7 elements matching state-machine closed set"

  - name: "Severity ladder"
    location: "§Severity"
    shape: "ordered list"
    expected_count: 5
    invariants:
      - "5 levels: critical, high, medium, low, info (high-to-low order)"

  - name: "Perf thresholds"
    location: "§Hot path / §Large bundle"
    shape: "dict[threshold_name, numeric_value_with_unit]"
    invariants:
      - "hot-path loop threshold: 1000 iterations/request"
      - "hot-path profiling threshold: 5% wall time"
      - "large bundle gzipped: 250 KB per chunk"
      - "large bundle uncompressed: 1 MB total entrypoint"

  - name: "Sort key order"
    location: "§Sort Order (canonical)"
    shape: "ordered list"
    expected_count: 4
    invariants:
      - "4 keys in order: reported_date, assignee, moscow, id"

  - name: "5W1H2C5M sub-blocks"
    location: "§5W1H2C5M"
    shape: "dict[section, list[str]]"
    invariants:
      - "5W: What, Why, Who, When, Where"
      - "1H: How"
      - "2C: Cost, Constraints"
      - "5M: Man, Machine, Material, Method, Measurement"

# Cross-block consistency checks — invariants that span multiple blocks.
cross_block_checks:
  - "every TYPE3 in §1 maps to a type in the 12-element closed set (bijection)"
  - "every status name in state machine appears in counts.by_status closed set"
  - "every scanner in §Scanner manifest appears verbatim in the 8-element list"
  - "severity ladder's top 4 (critical/high/medium/low) appear in §Severity table rows"
  - "forbidden-TYPE3 tokens listed in §1 (QA/DX/DOCS/PERF/ARCH) are absent from the 12-code canonical set"

not_exercised:
  - "R-anti-drift-state-dir-allowlist (needs a real scan)"
  - "R-anti-drift-id-format-strict (no IDs minted)"
  - "R-anti-drift-fingerprint-format-strict (no fingerprints minted)"
  - "X-no-field-invention (no items emitted)"

invocation:
  prompt_template: |
    Parse AUDIT.md (or SCHEMA.json post-E004) and validate the 11
    pure-data blocks listed in the fixture.yaml `blocks` section.
    Emit a capture.json with per-block pass/fail, cross-block check
    results, and a single top-level step_7_5_passed boolean. No
    repository scan. No .audit/ tree. Just the schema validation.
  temperature: 0.0
  seed: 42
