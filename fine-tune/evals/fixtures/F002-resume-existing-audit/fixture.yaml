# F002 — Resume-existing-audit, small repo, second-day scan
#
# Purpose: exercise the resume path. The agent is given a repo that
# already has a populated .audit/ from a prior run (seed/.audit/) and
# one new source file introducing a fresh finding. The agent MUST:
#
#   * Re-use existing AUD-... IDs by fingerprint match (no new IDs
#     minted for the pre-existing SEC and PRF findings).
#   * NOT append a new history[] entry to items whose status is
#     unchanged (anti-churn).
#   * Mint new IDs for the new QLT epic → story → task, using the
#     current run date (2026-04-21) in the ID prefix and NNNN
#     starting at 0001 for the new reported_date.
#   * Write a new daily mirror reports/2026/04/2026-04-21.json that
#     contains all 9 items (6 carried + 3 new) in canonical sort
#     order, while leaving 2026-04-20.json unchanged on disk.
#   * Append only the 3 new rows to changelog/transitions.jsonl
#     (append-only invariant).
#   * NOT repair state/mirror drift by deleting items.
#
# This fixture tests the rules that only bite on resume — the fresh
# fixture F001 cannot exercise them.

id: F002-resume-existing-audit
type: resume
description: >
  Small synthetic repo with an existing .audit/ produced by the F001
  run. One new source file (src/validator.js) introduces a QLT finding
  (unused import + dead code). The resume run must preserve the 6
  prior items by fingerprint and mint exactly 3 new items (epic, story,
  task) for the new QLT finding.

exercises_rules:
  - "R-anti-drift-no-self-scan"
  - "R-anti-drift-fingerprint-format-strict"
  - "R-anti-drift-status-machine-closed"
  - "R-anti-drift-canonical-sort-4key"
  - "R-anti-drift-transitions-append-only"
  - "R-anti-drift-mirror-state-invariants"
  - "X-wont-do-tombstones-required"
  - "R-anti-drift-no-status-shortcut"
  - "R-anti-drift-hitl-banner-required"
  - "P-step-7-5-self-conformance"
  - "O-run-summary-json-schema"
  - "O-mode-precedence-inline-over-env"
  - "X-no-fingerprint-collision-merge"

expected_findings:
  # Pre-existing — must be matched by fingerprint, not re-minted.
  - category: SEC
    type: security
    evidence_hint: "hard-coded API key in repo/src/config.js"
    severity_floor: high
    must_match_existing_fingerprint: "sha256:ac4421b18c135d38918ad448f43651bbdf0ab251c809b1d63232d66827efa43e"
  - category: PRF
    type: performance
    evidence_hint: "O(n^2) loop in repo/src/processor.js"
    severity_floor: medium
    must_match_existing_fingerprint: "sha256:2252fad2bf127083377a9ec30f896dc83caeb2aa4e54bb9b7642c6156918884a"
  # New this run — must mint new IDs with reported_date 2026-04-21.
  - category: QLT
    type: quality
    evidence_hint: "unused import (crypto) + dead legacy function in repo/src/validator.js"
    severity_floor: medium
    must_be_new: true

not_exercised:
  - "§EVIDENCE REDACTION trap — F005 tests planted secrets"
  - "interrupt recovery (use F003)"
  - "TYPE3 invention trap (use F004)"

invocation:
  prompt_template: |
    You are the AI Repository Audit Agent. Follow AUDIT.md exactly.
    The repository at fixtures/F002-resume-existing-audit/repo/ already
    has a .audit/ directory (seeded from fixtures/F002-resume-existing-audit/seed/.audit/).
    Do NOT re-bootstrap. Continue from the existing state. Current
    scan date is 2026-04-21.
    Produce the updated .audit/ tree in the run directory. Then stop.
  temperature: 0.0
  seed: 42
