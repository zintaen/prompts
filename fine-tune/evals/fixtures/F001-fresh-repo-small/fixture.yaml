# F001 — Fresh small repo, no prior .audit/
#
# Purpose: exercise the bootstrap path. The agent is given a minimal repo
# with no .audit/ directory and must produce a full first-run scan.
#
# This fixture.yaml is the metadata contract. run-baseline.sh and
# diff-vs-baseline.sh read this to know what rules to enforce per run.

id: F001-fresh-repo-small
type: fresh
description: >
  Small synthetic repo with 1 README, 1 dependency manifest, 2 source
  files containing 1 known security issue and 1 known performance issue.
  First-run scan; no existing .audit/ directory.

# Rules this fixture is designed to exercise. If a proposed AUDIT.md
# edit touches any of these, this fixture MUST be rerun as part of the
# eval gate.
exercises_rules:
  - "§3.a"        # anti-drift preamble — no restatement
  - "§3.b"        # item schema completeness
  - "§3.c"        # fingerprint format
  - "§3.e"        # history[] shape on first write
  - "§3.h"        # daily .md canonical shape
  - "§3.j"        # type field vs TYPE3 code
  - "§3.m"        # mirror-state invariants
  - "§ITEM SCHEMA"
  - "§Step 7.5"
  - "§DAILY REPORT LAYOUT"

# Seeded ground truth: the agent MUST produce findings that include
# these items (identified by their evidence, not by a specific id).
# Used by a future verifier to check the agent didn't miss known bugs.
expected_findings:
  - category: SEC
    type: security
    evidence_hint: "hard-coded API key in repo/src/config.js"
    severity_floor: high
  - category: PRF
    type: performance
    evidence_hint: "O(n^2) loop in repo/src/processor.js"
    severity_floor: medium

# Scenarios this fixture is NOT designed to exercise (so a failure here
# due to e.g. a redaction gap is suspect — use F005 for redaction).
not_exercised:
  - "§EVIDENCE REDACTION (use F005)"
  - "interrupt recovery (use F003)"
  - "TYPE3 invention trap (use F004)"

# Invocation template. The human (or future automation) uses this to
# tell the model exactly how to run AUDIT.md.
invocation:
  prompt_template: |
    You are the AI Repository Audit Agent. Follow AUDIT.md exactly.
    Scan the repository rooted at fixtures/F001-fresh-repo-small/repo/.
    Produce a .audit/ directory at fixtures/F001-fresh-repo-small/.audit-run-<run_id>/.
    Then stop.
  temperature: 0.0
  seed: 42  # if the model supports it
