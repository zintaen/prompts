schema_version: 1

exclusions:
  paths: ["vendor/", "node_modules/"]
  globs: ["*.min.js"]

scanners:
  security:     { enabled: true, severity_threshold: low }
  performance:  { enabled: true }
  reliability:  { enabled: true }
  quality:      { enabled: true }
  architecture: { enabled: true }
  dx:           { enabled: true }
  docs:         { enabled: true }
  ideas:        { enabled: true, max_per_run: 15 }

defaults:
  assignee_by_type:
    security: AGENT
    performance: AGENT
    reliability: AGENT
    quality: AGENT
    refactor: AGENT
    architecture: HUMAN
    feature: HUMAN
    idea: HUMAN
    docs: AGENT
    dx: AGENT
    infrastructure: HUMAN
    test: AGENT

  moscow_default_by_type:
    security: MUST
    performance: SHOULD
    reliability: SHOULD
    others: COULD

  review_threshold: SHOULD

limits:
  max_runtime_minutes: 20
  max_files_scanned: 5000
  max_file_size_mb: 1
  max_findings_per_run: 50
  max_lines_changed_per_task: 200
  max_files_per_task: 10
  large_repo_threshold_files: 10000

execute:
  require_human_approval: true
  block_types: [feature, idea, infrastructure]
  require_tests: true
  require_diff_preview: true

redaction:
  extra_patterns: []
